<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="style.css" />
<!-- Google tag (gtag.js) -->

<body>
<div class="card">

  <!-- HOME SCREEN -->

    <h1>Idiom Explorer 🌎</h1>
    <button onclick="startLearning()">📘 Learning Mode</button>
    <button onclick="startArcade()">⚡ Arcade Mode (60s)</button>

  <!-- QUIZ VIEW (shared) -->

      <span id="score"></span>

    <button id="nextBtn">Next</button>

  <div id="endView" style="display:none;"></div>
